<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TrendCart</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<header>

<h1>🛍️ TrendCart</h1>

<input type="text" id="search" placeholder="Search products...">

<nav>
<a href="#">Home</a>
<a href="#">Shoes</a>
<a href="#">Electronics</a>
<a href="#">Fashion</a>
<a href="#">Deals</a>
</nav>

</header>

<section class="hero">
<h2>Discover Amazing Products</h2>
<p>Best deals from Flipkart, Amazon and other stores.</p>

<button>Shop Now</button>
</section>

<section class="products">

<div class="card">
<img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=500">
<h3>Nike Running Shoes</h3>
<p class="price"><del>₹3999</del> ₹2499</p>
<p>⭐⭐⭐⭐⭐</p>
<button onclick="window.open('https://www.flipkart.com')">Buy</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=500">
<h3>Smart Watch</h3>
<p class="price"><del>₹2999</del> ₹1999</p>
<p>⭐⭐⭐⭐⭐</p>
<button onclick="window.open('https://www.flipkart.com')">Buy</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=500">
<h3>Headphones</h3>
<p class="price"><del>₹2499</del> ₹1499</p>
<p>⭐⭐⭐⭐☆</p>
<button onclick="window.open('https://www.amazon.in')">Buy</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1511707171634-5f897ff02aa9?w=500">
<h3>Smartphone</h3>
<p class="price"><del>₹24999</del> ₹19999</p>
<p>⭐⭐⭐⭐⭐</p>
<button onclick="window.open('https://www.flipkart.com')">Buy</button>
</div>

</section>

<script src="script.js"></script>

</body>
</html>
